name: Build and Test

on:
  push:
  pull_request:
  schedule:
    - cron: '30 0 22 * *'

env:
  ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: true

defaults:
  run:
    shell: bash

jobs:
  dpkg:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        os: [debian13, debian12, debian11, ubuntu25.04, ubuntu24.04, ubuntu22.04]

    steps:
      - uses: actions/checkout@v2
      - uses: actions/setup-python@v2

      - name: Build the docker
        env:
          OS: ${{ matrix.os }}
        run: docker build -t build .ci/${OS}

      - name: Run the docker
        run: docker run --name build -it -d -v`pwd`:/home/p00user/src  build

      - name: Build lib
        run: docker exec -u root build /bin/bash -c "mkdir ../build && DESTDIR=../build make && DESTDIR=../build make lib_install"

      - name: Build doc
        run: docker exec -u root build /bin/bash -c "DESTDIR=../build make doc_install"

      - name: Append documentation for the latest release version
        if: (! startsWith(github.ref, 'refs/heads/docs_')) && matrix.os == 'debian13'
        run: |
             docker  exec  --user root build  /bin/bash -c "chown -R p00user /home/p00user/src"
             docker  exec build /bin/bash -c "git config --unset-all remote.origin.fetch"
             docker  exec build /bin/bash -c "git config remote.origin.fetch '+refs/heads/*:refs/remotes/origin/*'"
             docker  exec build /bin/bash -c "git fetch && git clean -fd && git checkout gh-pages && git pull"
             docker  exec build /bin/bash -c "shopt -u dotglob && rm -rf*  "
             docker  exec build /bin/bash -c "mv -f ../build/doc/html/* ./"
             docker  exec build /bin/bash -c "mv -f ../build/doc/api/html ./latest/api/doxygen"
        
      - name: Deploy documentation
        if: (github.ref == 'refs/heads/master') && matrix.os == 'debian13'
        uses: s0/git-publish-subdir-action@develop
        env:
          REPO: self
          BRANCH: gh-pages
          FOLDER: .
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          MESSAGE: "Build: ({sha}) {msg}"


      - name: Stop the docker
        run: docker container stop build

